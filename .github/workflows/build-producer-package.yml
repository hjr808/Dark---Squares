name: Build Producer Package PDF

on:
  push:
    branches:
      - main
      - 'copilot/**'
    paths:
      - 'Producer-Package/**'
      - 'build_pdf.py'
      - '.github/workflows/build-producer-package.yml'
  pull_request:
    paths:
      - 'Producer-Package/**'
      - 'build_pdf.py'
  workflow_dispatch:

jobs:
  build-pdf:
    name: Generate Producer Package PDF
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install markdown weasyprint

      - name: Install system fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Build Producer Package PDF
        run: python3 build_pdf.py

      - name: Verify PDF was created
        run: |
          ls -lh DARK_SQUARES_TELEVISION_SERIES_PRODUCER_PACKAGE_v1.0.pdf
          echo "PDF size: $(du -sh DARK_SQUARES_TELEVISION_SERIES_PRODUCER_PACKAGE_v1.0.pdf | cut -f1)"

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DARK_SQUARES_PRODUCER_PACKAGE_v1.0
          path: DARK_SQUARES_TELEVISION_SERIES_PRODUCER_PACKAGE_v1.0.pdf
          retention-days: 90

      - name: Upload combined source as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DARK_SQUARES_PRODUCER_PACKAGE_SOURCE
          path: DARK_SQUARES_PRODUCER_PACKAGE_SOURCE.md
          retention-days: 90
